# Armenia deployment - use with: REGION=am, SMS_PROVIDER=am_sms
services:
  - type: web
    name: kitkat-promo-backend-am
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGION
        value: am
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: promo-db-am
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: promo-redis-am
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: COOKIE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMS_PROVIDER
        value: am_sms
      - key: AM_SMS_API_KEY
        sync: false
      - key: AM_SMS_SENDER
        sync: false
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: OTP_MAX_ATTEMPTS
        value: 3
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: 60
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100

  - type: redis
    name: promo-redis-am
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: promo-db-am
    plan: free
    databaseName: promo_admin
    user: promo_admin
