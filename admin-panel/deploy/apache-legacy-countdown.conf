# Apache: serve countdown pages (ge, am, az)
# 1. Run: npm run build:countdown (in admin-panel)
# 2. Copy each dist-legacy-countdown-* to its path on the server
# 3. Add these inside your VirtualHost (mod_alias, mod_rewrite)

Alias /legacy-countdown-ge /var/www/legacy-countdown-ge
<Directory /var/www/legacy-countdown-ge>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.html countdown-ge.html
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ /legacy-countdown-ge/index.html [L]
    </IfModule>
</Directory>

