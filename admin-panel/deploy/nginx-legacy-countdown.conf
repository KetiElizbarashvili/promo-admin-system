# Nginx: serve countdown pages (ge, am, az)
# 1. Run: npm run build:countdown (in admin-panel)
# 2. Copy each dist-legacy-countdown-* to its path on the server
# 3. Add these inside your server {} block

location /legacy-countdown-ge/ {
    alias /var/www/legacy-countdown-ge/;
    index index.html countdown-ge.html;
    try_files $uri $uri/ /legacy-countdown-ge/index.html;
}

location /legacy-countdown-am/ {
    alias /var/www/legacy-countdown-am/;
    index index.html countdown-am.html;
    try_files $uri $uri/ /legacy-countdown-am/index.html;
}

location /legacy-countdown-az/ {
    alias /var/www/legacy-countdown-az/;
    index index.html countdown-az.html;
    try_files $uri $uri/ /legacy-countdown-az/index.html;
}
